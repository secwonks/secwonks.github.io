<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Code+Pro:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  {% seo %}
  {% feed_meta %}
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <div class="logo-mark">
          <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Security Wonks logo" />
        </div>
        Security Wonks
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a>
        <a href="{{ '/slack/' | relative_url }}" {% if page.url == '/slack/' %}class="active"{% endif %}>Slack</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a>
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="footer-brand"><span>Security</span> Wonks</div>
      <div class="footer-meta">
        &copy; {{ 'now' | date: "%Y" }} Security Wonks &middot;
        <a href="{{ '/blog/feed.xml' | relative_url }}">RSS Feed</a>
      </div>
    </div>
  </footer>
<script>
  MathJax = { tex: { inlineMath: [['$','$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</body>
</html>
